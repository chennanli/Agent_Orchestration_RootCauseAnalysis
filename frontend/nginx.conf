server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Handle React Router (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- API proxying ----
    # The new Live Copilot routes (/api/agent/*, /api/anomaly/*, /api/sim/*)
    # are mounted with the /api prefix on the FastAPI backend, so the prefix
    # MUST be preserved when proxying. The legacy /api/models/* and similar
    # routes on the old backend are mounted at /<name> (no /api), so they
    # need the prefix STRIPPED. We split the location blocks accordingly.
    #
    # nginx selects the longest matching prefix, so the specific Live
    # Copilot blocks below take precedence over the legacy catch-all.

    location /api/agent/ {
        proxy_pass http://backend:8000;        # NOTE: no trailing slash → preserves /api/agent prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE-friendly settings for /api/agent/runs/{id}/stream:
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding off;
    }
    location /api/anomaly/ {
        proxy_pass http://backend:8000;        # no strip
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/sim/ {
        proxy_pass http://backend:8000;        # no strip
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # Legacy /api/* routes: strip the /api prefix (old backend mounts at /).
    location /api/ {
        proxy_pass http://backend:8000/;       # trailing slash → strips /api
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bare-path /stream is the live-data SSE used by the sparkline grid.
    # Without this, the frontend gets 404 from nginx, EventSource keeps
    # retrying, and the sensors never draw.
    location /stream {
        proxy_pass http://backend:8000/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }
    # Bare-path /ingest is the live-data ingress from unified_console.py.
    location /ingest {
        proxy_pass http://backend:8000/ingest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}


# Continuous Deployment for TEP Agent Orchestration / Root-Cause Analysis.
#
# When you push a git tag matching `v*` (e.g., `git tag v0.3.0 && git push
# --tags`), this workflow builds THREE Docker images — backend, frontend,
# console — and pushes them to GitHub Container Registry under the repo's
# own namespace:
#
#     ghcr.io/chennanli/agent_orchestration_rootcauseanalysis/backend:v0.3.0
#     ghcr.io/chennanli/agent_orchestration_rootcauseanalysis/frontend:v0.3.0
#     ghcr.io/chennanli/agent_orchestration_rootcauseanalysis/console:v0.3.0
#
# Anyone (or any production server) can then `docker compose pull` against
# the docker-compose.yml in this repo and get a fully reproducible deploy
# — no local build needed, no "works on my machine" risk.
#
# Why GHCR (not Docker Hub):
#   - Free + unlimited for public repos
#   - Authenticated automatically via the workflow's GITHUB_TOKEN
#   - Lives next to the source — anyone reading the code sees the images
#
# Why tag-driven (not every push):
#   - You don't want EVERY commit on main to produce a new image — that's
#     noise. Tags are explicit ("ship this version") and align with semver.
#   - CI already runs on every push for verification. CD runs only when
#     you decide a commit is worth a version number.
name: Release

on:
  push:
    # Triggers on any v-prefixed tag: v0.3.0, v1.0.0-rc1, v2.0.0, etc.
    # Won't trigger on regular branch pushes or PRs.
    tags: ["v*"]
  # Manual trigger from the Actions tab — handy when you want to re-ship
  # a tag after fixing a Dockerfile, without bumping the version.
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g., v0.3.0)"
        required: true
        default: "v0.0.0-manual"

# Cancel an in-flight build of the same tag if a new one starts. Avoids
# two workflows racing to push the same `:latest` label.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push ${{ matrix.component }} image
    runs-on: ubuntu-latest
    # GHCR needs explicit write permission on the workflow — by default
    # GITHUB_TOKEN can only read packages.
    permissions:
      contents: read
      packages: write

    # Three components, three parallel jobs. Each one is independent and
    # cacheable on its own — a frontend-only change won't invalidate the
    # backend cache.
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            dockerfile: Dockerfile.backend
            context: .
          - component: console
            dockerfile: Dockerfile.console
            context: .
          - component: frontend
            dockerfile: frontend/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      # QEMU lets us cross-compile for non-amd64 architectures
      # (e.g., arm64 for Apple Silicon, Graviton). Even if today we only
      # target amd64, having QEMU set up means the next time we add
      # linux/arm64 to platforms below, nothing else changes.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # buildx = Docker's modern builder. Caches layers, supports multi-
      # platform images, and is what docker/build-push-action uses.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into GHCR using the workflow's own short-lived token. Nothing
      # to configure in repo settings — token is provisioned per-run.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the image name + version once.
      - name: Compute image name
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO_LC}/${{ matrix.component }}" >> "$GITHUB_OUTPUT"
          # Resolve the version: tag push → github.ref_name; manual run → input.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Two tags on the same image:
          #   :v0.3.0  → immutable, what you reference in production
          #   :latest  → moves on every release, convenient for local dev
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          # OCI standard labels. The `source` label is what GitHub uses to
          # auto-link the published package back to this repo, so the image
          # shows up in the repo's "Packages" sidebar and the
          # /pkgs/container/.../  URL works. Without this label the package
          # exists but lives "loose" under the user namespace only.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          # Reuse layer cache across runs — turns a 5-min build into 30 sec
          # when only the application code changed. `scope` keeps each
          # component's cache separate so they don't trash each other.
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          # Build for x86_64 only for now. To also build arm64 add
          # `linux/arm64` here — QEMU is already set up above.
          platforms: linux/amd64
          # Provenance attestations are useful but take extra time and
          # occasionally fail on some registries; off until we need them.
          provenance: false

      - name: Summarize
        run: |
          echo "::notice title=Published::${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}"
          echo "  docker pull ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}"
